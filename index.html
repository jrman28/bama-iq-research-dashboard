<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AL/IQ — Research Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Doto:wght@400;700;900&family=Fraunces:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* ─── DARK (default) ─────────────────────────────────────── */
    --bg:           #0A0A0A;
    --bg-elev-1:    #131313;
    --bg-elev-2:    #1A1A1A;
    --ink-rgb:      244 241 234;
    --ink:          rgb(var(--ink-rgb));
    --ink-90:       rgb(var(--ink-rgb) / 0.90);
    --ink-60:       rgb(var(--ink-rgb) / 0.60);
    --ink-45:       rgb(var(--ink-rgb) / 0.45);
    --ink-30:       rgb(var(--ink-rgb) / 0.30);
    --ink-18:       rgb(var(--ink-rgb) / 0.18);
    --ink-10:       rgb(var(--ink-rgb) / 0.10);
    --ink-06:       rgb(var(--ink-rgb) / 0.06);
    --line:         rgb(var(--ink-rgb) / 0.14);
    --line-soft:    rgb(var(--ink-rgb) / 0.08);
    --topbar-bg:    rgb(10 10 10 / 0.85);
    --dot:          rgb(var(--ink-rgb) / 0.025);
    --tap-shadow:   none;
    --shadow-hover:
                    0 1px 1px rgb(0 0 0 / 0.35),
                    0 4px 16px rgb(0 0 0 / 0.40);
    --primary-ink:  #0A0A0A;          /* text on primary buttons (fixed) */

    /* Accents — mode-invariant */
    --teal:         #1A9090;
    --teal-deep:    #0D7070;
    --amber:        #F5A623;
    --red:          #D71921;
    --green:        #5BCE7B;
    --blue:         #4A90E2;
    --violet:       #9B7BE2;

    --font-display: 'Space Grotesk', system-ui, sans-serif;
    --font-mono:    'Space Mono', ui-monospace, monospace;
    --font-dot:     'Doto', system-ui, monospace;
    --font-serif:   'Fraunces', Georgia, serif;

    /* Easing — Krehel: CSS transitions, specific properties only */
    --ease:         cubic-bezier(0.4, 0, 0.2, 1);
    --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);
    --tap-scale:    0.96;
  }

  /* ─── LIGHT ──────────────────────────────────────────────── */
  [data-theme="light"] {
    --bg:           #F4F1EA;          /* warm cream — AL/IQ paper */
    --bg-elev-1:    #FAF7F0;
    --bg-elev-2:    #FFFFFF;
    --ink-rgb:      12 18 25;
    --ink:          rgb(var(--ink-rgb));
    --ink-90:       rgb(var(--ink-rgb) / 0.90);
    --ink-60:       rgb(var(--ink-rgb) / 0.60);
    --ink-45:       rgb(var(--ink-rgb) / 0.45);
    --ink-30:       rgb(var(--ink-rgb) / 0.30);
    --ink-18:       rgb(var(--ink-rgb) / 0.18);
    --ink-10:       rgb(var(--ink-rgb) / 0.10);
    --ink-06:       rgb(var(--ink-rgb) / 0.04);
    --line:         rgb(var(--ink-rgb) / 0.14);
    --line-soft:    rgb(var(--ink-rgb) / 0.08);
    --topbar-bg:    rgb(244 241 234 / 0.85);
    --dot:          rgb(var(--ink-rgb) / 0.07);
    --shadow-hover:
                    0 1px 1px rgb(12 18 25 / 0.04),
                    0 2px 4px rgb(12 18 25 / 0.04),
                    0 8px 24px rgb(12 18 25 / 0.06);
    --teal:         #0D7070;          /* deeper for legibility on cream */
    --teal-deep:    #0A5959;
  }

  html {
    font-size: 16px;
    background: var(--bg);
    transition: background-color 0.3s var(--ease);
  }
  body {
    font-family: var(--font-display);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    /* MIFB: thinner, crisper text rendering */
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    transition:
      background-color 0.3s var(--ease),
      color 0.3s var(--ease);
  }

  ::selection { background: var(--ink); color: var(--bg); }

  /* MIFB: text-wrap defaults so titles & paragraphs always look right */
  h1, h2, h3, h4, .doc-title, .ov-hero-title, .section-title, .card-title {
    text-wrap: balance;
  }
  p, .doc-sub, .card-body, .list-desc, .ov-hero-sub {
    text-wrap: pretty;
  }

  /* Subtle dot-matrix backdrop — themed */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(var(--dot) 1px, transparent 1px);
    background-size: 14px 14px;
    pointer-events: none;
    z-index: 0;
    transition: background-image 0.3s var(--ease);
  }

  #root { position: relative; z-index: 1; }

  /* ─── App Shell ─────────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }

  /* ─── Sidebar ───────────────────────────────────────────────── */
  .sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    border-right: 1px solid var(--line);
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    background: var(--bg);
    overflow-y: auto;
  }

  .sb-brand {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .sb-brand-row { display:flex; align-items:baseline; gap:1px; }
  .sb-al { font-family: var(--font-serif); font-size: 26px; font-weight: 700; letter-spacing:-0.03em; color:var(--ink); }
  .sb-iq { font-family: var(--font-serif); font-size: 26px; font-weight: 400; color:var(--teal); }
  .sb-tag {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--ink-45);
    text-transform: uppercase;
  }

  .sb-live {
    display: inline-flex; align-items:center; gap:8px;
    margin-top: 12px;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--green);
    text-transform: uppercase;
  }
  .sb-live::before {
    content: ''; width:6px; height:6px; border-radius:50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulseDot 2.4s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%,100% { opacity: 1; }
    50%     { opacity: 0.35; }
  }

  .sb-section-title {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--ink-30);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .sb-nav { display:flex; flex-direction:column; gap: 2px; }
  .sb-item {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    gap: 10px;
    min-height: 40px;
    padding: 10px 12px;
    border: 1px solid transparent;
    cursor: pointer;
    text-align: left;
    background: transparent;
    color: var(--ink-60);
    font-family: var(--font-display);
    font-size: 13px;
    transition:
      background-color 0.15s var(--ease),
      border-color 0.15s var(--ease),
      color 0.15s var(--ease),
      transform 0.12s var(--ease);
  }
  .sb-item:hover { color: var(--ink); background: var(--ink-06); }
  .sb-item:active { transform: scale(var(--tap-scale)); }
  .sb-item.active {
    color: var(--ink);
    background: var(--ink-06);
    border-color: var(--line);
  }
  .sb-item-num {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-30);
    letter-spacing: 0.08em;
  }
  .sb-item.active .sb-item-num { color: var(--teal); }
  .sb-item-meta {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--ink-30);
    letter-spacing: 0.1em;
  }

  .sb-foot {
    margin-top: auto;
    padding-top: 24px;
    border-top: 1px solid var(--line-soft);
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--ink-30);
    letter-spacing: 0.1em;
    line-height: 1.8;
    text-transform: uppercase;
  }

  /* ─── Main scroll area ───────────────────────────────────────── */
  .main {
    min-width: 0;
    padding: 0;
  }

  /* ─── Topbar ─────────────────────────────────────────────────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 48px;
    background: var(--topbar-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    transition: background-color 0.3s var(--ease), border-color 0.3s var(--ease);
  }

  /* Theme toggle */
  .theme-toggle {
    width: 40px; height: 40px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    padding: 0;
    transition:
      background-color 0.18s var(--ease),
      border-color 0.18s var(--ease),
      transform 0.12s var(--ease);
  }
  .theme-toggle:hover { background: var(--ink-06); border-color: var(--ink-30); }
  .theme-toggle:active { transform: scale(var(--tap-scale)); }
  .theme-toggle svg {
    width: 16px; height: 16px;
    transition: transform 0.4s var(--ease-out), opacity 0.2s var(--ease);
  }
  .theme-toggle .icon-sun  { display: none; }
  .theme-toggle .icon-moon { display: block; }
  [data-theme="light"] .theme-toggle .icon-sun  { display: block; }
  [data-theme="light"] .theme-toggle .icon-moon { display: none; }
  .tb-crumb {
    display: flex; align-items: center; gap: 14px;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.16em; color: var(--ink-45);
    text-transform: uppercase;
  }
  .tb-crumb b { color: var(--ink); font-weight: 400; }
  .tb-crumb .slash { color: var(--ink-30); }
  .tb-actions { display:flex; align-items:center; gap:14px; }
  .tb-meta {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.18em; color: var(--ink-45);
    text-transform: uppercase;
  }
  .tb-meta b { color: var(--ink); font-weight: 400; }
  .tb-divider { width:1px; height:14px; background: var(--line); }

  /* ─── Page body ──────────────────────────────────────────────── */
  .page {
    padding: 64px 48px 120px;
    max-width: 1280px;
  }
  /* MIFB: stagger entrance — don't animate one big container */
  .page > * {
    animation: pageIn 0.55s var(--ease-out) both;
  }
  .page > *:nth-child(1) { animation-delay: 0ms;   }
  .page > *:nth-child(2) { animation-delay: 80ms;  }
  .page > *:nth-child(3) { animation-delay: 140ms; }
  .page > *:nth-child(4) { animation-delay: 200ms; }
  .page > *:nth-child(5) { animation-delay: 240ms; }
  .page > *:nth-child(6) { animation-delay: 280ms; }
  .page > *:nth-child(7) { animation-delay: 320ms; }
  .page > *:nth-child(8) { animation-delay: 360ms; }
  .page > *:nth-child(n+9) { animation-delay: 380ms; }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(12px); filter: blur(2px); }
    to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
  }

  /* ─── Doc header ─────────────────────────────────────────────── */
  .doc-head {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 48px;
    align-items: end;
    padding-bottom: 40px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 56px;
  }
  .doc-head-left { min-width: 0; }
  .doc-eyebrow {
    display:flex; gap: 16px; align-items: center;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.2em; color: var(--ink-45);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .doc-eyebrow .dot { color: var(--teal); }
  .doc-eyebrow b { color: var(--ink); font-weight: 400; }

  .doc-title {
    font-family: var(--font-display);
    font-size: clamp(40px, 5vw, 64px);
    font-weight: 500;
    line-height: 1.02;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 18px;
    text-wrap: balance;
  }
  .doc-sub {
    font-family: var(--font-display);
    font-size: 18px;
    line-height: 1.5;
    color: var(--ink-60);
    max-width: 60ch;
    text-wrap: pretty;
  }

  /* Big doto numeral on the right */
  .doc-bignum {
    font-family: var(--font-dot);
    font-weight: 900;
    font-size: 220px;
    line-height: 0.78;
    color: var(--ink);
    letter-spacing: -0.04em;
    text-align: right;
    user-select: none;
  }
  .doc-bignum-label {
    text-align: right;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-45);
    text-transform: uppercase;
    margin-top: 12px;
  }

  /* Stats bar across header */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 0;
    border: 1px solid var(--line);
    margin-bottom: 56px;
  }
  .stat {
    padding: 22px 24px;
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 8px;
  }
  .stat:last-child { border-right: none; }
  .stat-label {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.2em; color: var(--ink-45);
    text-transform: uppercase;
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .stat-value.mono { font-family: var(--font-mono); font-size: 22px; }
  .stat-trend {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--ink-45); letter-spacing: 0.08em;
  }
  .stat-trend.up { color: var(--green); }
  .stat-trend.down { color: var(--red); }

  /* ─── Section ────────────────────────────────────────────────── */
  .section {
    margin-bottom: 72px;
  }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 32px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .section-id {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-45);
    text-transform: uppercase;
  }

  /* ─── Card ───────────────────────────────────────────────────── */
  .card {
    border: 1px solid var(--line);
    background: var(--bg-elev-1);
    padding: 24px;
    transition:
      border-color 0.18s var(--ease),
      background-color 0.3s var(--ease);
  }
  .card.subtle { background: transparent; }
  .card-label {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.2em; color: var(--ink-45);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex; align-items:center; gap: 10px;
  }
  .card-label::before {
    content: ''; width: 4px; height: 4px; background: var(--teal);
    flex-shrink: 0;
  }
  .card-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .card-body {
    font-family: var(--font-display);
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-60);
  }

  /* ─── Grids ──────────────────────────────────────────────────── */
  .grid-2 { display:grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .grid-3 { display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display:grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .grid-asym { display:grid; grid-template-columns: 2fr 1fr; gap: 16px; }

  /* ─── Segmented bar (Nothing × Digg pattern) ─────────────────── */
  .seg-bar {
    display: flex; gap: 2px;
    height: 8px;
    align-items: stretch;
  }
  .seg-bar .seg { flex: 1; background: var(--ink-10); }
  .seg-bar .seg.on { background: var(--ink); }
  .seg-bar .seg.amber { background: var(--amber); }
  .seg-bar .seg.teal { background: var(--teal); }
  .seg-bar .seg.red { background: var(--red); }
  .seg-bar .seg.green { background: var(--green); }
  .seg-bar .seg.blue { background: var(--blue); }
  .seg-bar .seg.violet { background: var(--violet); }

  /* ─── Pill ───────────────────────────────────────────────────── */
  .pill {
    display: inline-flex; align-items:center; gap: 6px;
    padding: 4px 10px;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase;
    border: 1px solid var(--line);
    color: var(--ink-60);
    border-radius: 999px;
  }
  .pill.adopt {
    color: var(--green); border-color: rgba(91,206,123,0.3);
    background: rgba(91,206,123,0.06);
  }
  .pill.reject {
    color: var(--red); border-color: rgba(215,25,33,0.3);
    background: rgba(215,25,33,0.06);
  }
  .pill.note {
    color: var(--amber); border-color: rgba(245,166,35,0.3);
    background: rgba(245,166,35,0.06);
  }
  .pill.teal {
    color: var(--teal); border-color: rgba(26,144,144,0.3);
    background: rgba(26,144,144,0.06);
  }

  /* ─── Bar chart row ──────────────────────────────────────────── */
  .bar-row {
    display: grid;
    grid-template-columns: 200px 1fr 60px;
    align-items: center;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .bar-row:last-child { border-bottom: none; }
  .bar-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-60);
    text-transform: uppercase;
  }
  .bar-track {
    height: 24px;
    background: var(--ink-06);
    display: flex;
    align-items: stretch;
  }
  .bar-fill {
    background: var(--ink);
    display: flex; align-items:center; justify-content:flex-end;
    padding-right: 8px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--bg);
  }
  .bar-fill.teal { background: var(--teal); color: var(--ink); }
  .bar-fill.amber { background: var(--amber); color: #0A0A0A; }
  .bar-value {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ─── Donut ──────────────────────────────────────────────────── */
  .donut-wrap {
    display: flex; gap: 32px; align-items: center;
  }
  .donut-svg { flex-shrink: 0; }
  .donut-legend { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .donut-legend-row {
    display: grid; grid-template-columns: 14px 1fr auto auto;
    gap: 12px; align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .donut-swatch { width:10px; height: 10px; }
  .donut-name {
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--ink);
  }
  .donut-name small {
    display: block;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--ink-45);
    letter-spacing: 0.08em;
    margin-top: 2px;
    text-transform: uppercase;
  }
  .donut-pct {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .donut-count {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--ink-45);
    letter-spacing: 0.08em;
  }

  /* ─── Step funnel ────────────────────────────────────────────── */
  .funnel {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .funnel-step {
    display: grid;
    grid-template-columns: 60px 1fr 280px;
    gap: 24px;
    align-items: stretch;
  }
  .funnel-num {
    font-family: var(--font-dot);
    font-weight: 900;
    font-size: 52px;
    color: var(--ink);
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--line);
    background: var(--bg-elev-1);
  }
  .funnel-bar-wrap {
    display: flex; flex-direction: column; gap: 8px; justify-content: center;
    border: 1px solid var(--line); padding: 20px 24px;
    background: var(--bg-elev-1);
  }
  .funnel-step-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-45);
    text-transform: uppercase;
  }
  .funnel-step-name {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--ink);
    font-weight: 500;
  }
  .funnel-step-desc {
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--ink-60);
    line-height: 1.5;
    border-left: 1px solid var(--line);
    padding: 20px 24px;
    background: var(--bg-elev-1);
  }
  .funnel-bar {
    height: 6px; background: var(--ink-10); position: relative;
  }
  .funnel-bar > div {
    height: 100%; background: var(--ink);
  }
  .funnel-bar.teal > div { background: var(--teal); }
  .funnel-bar.amber > div { background: var(--amber); }

  /* ─── Hero metric ────────────────────────────────────────────── */
  .hero-metric {
    border: 1px solid var(--line);
    padding: 32px;
    background: var(--bg-elev-1);
    display: flex; flex-direction: column; gap: 8px;
  }
  .hero-metric .hm-label {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.2em; color: var(--ink-45);
    text-transform: uppercase;
  }
  .hero-metric .hm-value {
    font-family: var(--font-dot);
    font-weight: 900;
    font-size: 88px;
    color: var(--ink);
    line-height: 0.9;
    letter-spacing: -0.03em;
  }
  .hero-metric .hm-value.smaller { font-size: 64px; }
  .hero-metric .hm-unit {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--ink-45); letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .hero-metric .hm-note {
    font-family: var(--font-display); font-size: 12px;
    color: var(--ink-60); line-height: 1.5;
    margin-top: 8px;
  }

  /* ─── Sentiment split bar ────────────────────────────────────── */
  .split-bar {
    display: flex; height: 32px; align-items: stretch;
    border: 1px solid var(--line);
  }
  .split-seg {
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--bg); font-weight: 700;
  }
  .split-seg.pos { background: var(--green); }
  .split-seg.neg { background: var(--red); color: var(--ink); }
  .split-seg.neutral { background: var(--ink-30); }

  /* ─── List ───────────────────────────────────────────────────── */
  .list {
    display: flex; flex-direction: column;
  }
  .list-item {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--line-soft);
    align-items: baseline;
  }
  .list-item:last-child { border-bottom: none; }
  .list-num {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-30);
    letter-spacing: 0.1em;
  }
  .list-body { min-width: 0; }
  .list-title {
    font-family: var(--font-display);
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .list-desc {
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--ink-60);
    line-height: 1.5;
  }

  /* ─── Table ──────────────────────────────────────────────────── */
  .table {
    width: 100%;
    border: 1px solid var(--line);
    border-collapse: collapse;
    font-size: 13px;
  }
  .table th {
    text-align: left;
    padding: 14px 16px;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--ink-45);
    text-transform: uppercase;
    font-weight: 400;
    border-bottom: 1px solid var(--line);
    background: var(--bg-elev-1);
  }
  .table td {
    padding: 14px 16px;
    color: var(--ink-90);
    font-family: var(--font-display);
    border-bottom: 1px solid var(--line-soft);
    vertical-align: top;
  }
  .table tr:last-child td { border-bottom: none; }
  .table td.mono {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-60);
  }

  /* ─── KPI tile grid ──────────────────────────────────────────── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
  }
  .kpi {
    padding: 24px;
    background: var(--bg);
    display: flex; flex-direction: column; gap: 6px;
  }
  .kpi-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--ink-45);
    text-transform: uppercase;
  }
  .kpi-value {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .kpi-value.mono {
    font-family: var(--font-mono);
    font-size: 22px;
  }
  .kpi-value.dot {
    font-family: var(--font-dot); font-weight: 900;
    font-size: 56px;
  }
  .kpi-meta {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--ink-45);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ─── Code / spec inline ─────────────────────────────────────── */
  code, .mono {
    font-family: var(--font-mono);
  }
  .spec {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-60);
    line-height: 1.8;
    padding: 14px 18px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line-soft);
  }
  .spec b { color: var(--ink); font-weight: 400; }
  .spec .k { color: var(--teal); }

  /* ─── Color swatch ───────────────────────────────────────────── */
  .swatch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
  }
  .swatch {
    background: var(--bg-elev-1);
    padding: 0;
    display: flex; flex-direction: column;
  }
  .swatch-color {
    height: 84px;
    border-bottom: 1px solid var(--line);
  }
  .swatch-meta {
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .swatch-name {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink);
    letter-spacing: 0.05em;
  }
  .swatch-hex {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--ink-45);
    letter-spacing: 0.05em;
  }

  /* ─── Overview hero ──────────────────────────────────────────── */
  .ov-hero {
    border: 1px solid var(--line);
    background: var(--bg-elev-1);
    padding: 56px;
    margin-bottom: 56px;
    position: relative;
    overflow: hidden;
  }
  .ov-hero-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 48px;
    align-items: end;
  }
  .ov-hero-title {
    font-family: var(--font-display);
    font-size: clamp(40px, 5vw, 72px);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--ink);
    text-wrap: balance;
  }
  .ov-hero-title .accent { color: var(--teal); }
  .ov-hero-sub {
    font-family: var(--font-display);
    font-size: 16px;
    line-height: 1.5;
    color: var(--ink-60);
    margin-top: 20px;
    max-width: 56ch;
  }
  .ov-bignumber {
    font-family: var(--font-dot);
    font-weight: 900;
    font-size: 280px;
    line-height: 0.78;
    color: var(--teal);
    text-align: right;
    letter-spacing: -0.04em;
  }

  /* tiny circles (instrument feel) */
  .circles {
    display: flex; gap: 6px; align-items: center;
  }
  .circle { width: 8px; height: 8px; border-radius: 50%; border: 1px solid var(--ink-30); }
  .circle.on { background: var(--ink); border-color: var(--ink); }

  /* ─── Comparison split ───────────────────────────────────────── */
  .comp {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
  }
  .comp-col {
    background: var(--bg);
    padding: 24px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .comp-head {
    display:flex; align-items:center; justify-content:space-between;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line-soft);
  }
  .comp-head h4 {
    font-family: var(--font-display);
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }
  .comp-row {
    display: flex; gap: 12px; align-items: baseline;
    padding: 6px 0;
  }
  .comp-row .k {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--ink-30);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    min-width: 32px;
  }
  .comp-row .v {
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--ink-90);
    line-height: 1.45;
  }

  /* ─── Hover for nav items in lists ───────────────────────────── */
  .doc-jump {
    display: grid;
    grid-template-columns: 80px 1fr 100px;
    gap: 24px;
    align-items: center;
    padding: 24px 28px;
    border: 1px solid var(--line);
    background: var(--bg-elev-1);
    cursor: pointer;
    transition:
      border-color 0.18s var(--ease),
      background-color 0.18s var(--ease),
      transform 0.12s var(--ease),
      box-shadow 0.18s var(--ease);
    text-align: left;
    font-family: var(--font-display);
    color: inherit;
    will-change: transform;
  }
  .doc-jump:hover {
    border-color: var(--ink-45);
    background: var(--bg-elev-2);
    box-shadow: var(--shadow-hover);
  }
  .doc-jump:active { transform: scale(var(--tap-scale)); }
  .doc-jump .doc-jump-arrow {
    transition: transform 0.22s var(--ease-out);
  }
  .doc-jump:hover .doc-jump-arrow { transform: translateX(4px); }
  .doc-jump-num {
    font-family: var(--font-dot);
    font-weight: 900;
    font-size: 56px;
    color: var(--ink);
    line-height: 1;
  }
  .doc-jump-body { min-width: 0; }
  .doc-jump-tag {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.2em; color: var(--teal);
    text-transform: uppercase; margin-bottom: 6px;
  }
  .doc-jump-title {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--ink);
    font-weight: 500;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .doc-jump-sub {
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--ink-60);
    line-height: 1.4;
  }
  .doc-jump-meta {
    text-align: right;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-45);
    letter-spacing: 0.08em;
  }
  .doc-jump-meta b { display:block; color: var(--ink); font-size: 14px; margin-bottom: 4px; }
  .doc-jump-arrow {
    font-family: var(--font-mono); font-size: 16px;
    color: var(--ink-30);
    margin-top: 6px;
  }

  /* ─── Type spec demo ─────────────────────────────────────────── */
  .type-row {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 32px;
    padding: 22px 0;
    border-bottom: 1px solid var(--line-soft);
    align-items: baseline;
  }
  .type-row:last-child { border-bottom: none; }
  .type-spec {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-45);
    letter-spacing: 0.05em;
    line-height: 1.8;
    text-transform: uppercase;
  }
  .type-spec b { color: var(--ink); font-weight: 400; }
  .type-preview { color: var(--ink); }

  /* ─── Footer ─────────────────────────────────────────────────── */
  .page-foot {
    margin-top: 96px;
    padding-top: 32px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-30);
    text-transform: uppercase;
  }
  .page-foot a, .page-foot button {
    color: var(--ink);
    background: none; border: 1px solid var(--line);
    min-height: 40px; padding: 10px 18px; cursor: pointer;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
    transition:
      background-color 0.18s var(--ease),
      color 0.18s var(--ease),
      border-color 0.18s var(--ease),
      transform 0.12s var(--ease);
  }
  .page-foot button:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .page-foot button:active { transform: scale(var(--tap-scale)); }

  /* ─── MIFB: respect reduced-motion ──────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* ─── Responsiveness ─────────────────────────────────────────── */
  @media (max-width: 1024px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; border-right: none; border-bottom: 1px solid var(--line); }
    .doc-head { grid-template-columns: 1fr; }
    .doc-bignum { text-align: left; font-size: 140px; }
    .doc-bignum-label { text-align: left; }
    .grid-3, .grid-4, .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-asym { grid-template-columns: 1fr; }
    .funnel-step { grid-template-columns: 48px 1fr; }
    .funnel-step-desc { grid-column: 1 / -1; }
    .topbar, .page { padding-left: 24px; padding-right: 24px; }
    .ov-hero-grid { grid-template-columns: 1fr; }
    .ov-bignumber { font-size: 180px; text-align: left; }
  }
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
